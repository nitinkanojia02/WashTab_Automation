<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WashTab Automation MVP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f7f9fc; }
        .page-wrap { max-width: 1100px; margin: 0 auto; }
        textarea.code { font-family: monospace; min-height: 420px; }
        .card { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .banner-subtitle { font-size: 0.95rem; opacity: 0.85; }
        .status-pill { font-size: 0.8rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid page-wrap d-flex justify-content-between align-items-center">
        <div>
            <a class="navbar-brand" href="/">WashTab Automation MVP</a>
            <div class="text-light banner-subtitle">Human-in-the-loop AI test design and automation workbench</div>
        </div>
        <a href="/workflow/new" class="btn btn-outline-light btn-sm">Create Workflow</a>
    </div>
</nav>
<div class="container page-wrap mb-5">
    {% if success_message %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ success_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}
    {% if error_message %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ error_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
